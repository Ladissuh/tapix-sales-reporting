name: Weekly Sales Report

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      # main.py obsahuje dvě bezpečnostní pojistky, které tu ZŮSTÁVAJÍ beze
      # změny bez ohledu na to, jak se výstup dál publikuje:
      #   1) fetch_and_persist() odmítne zapsat týden, jehož celkový objem
      #      je podezřele nízký (< 30 % minulého týdne) - chrání proti
      #      přerušenému/nekompletnímu HubSpot fetchu.
      #   2) data_store.append_weekly_snapshot() odmítne přepsat týden, který
      #      už je "uzavřený" (existuje novější týden) - chrání proti tichému
      #      přepsání historie. Obojí žije v Pythonu, ne v tomhle workflow.
      - name: Run the report generator
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python src/main.py

      # Historická CSV data (data/) se commitují do gitu - příští týden na
      # ně skript navazuje a bez nich by pojistky výše nemohly fungovat.
      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Weekly snapshot update"
          git push

      # Vedle souboru s rokem v názvu (archiv/přehlednost) uložíme i kopii
      # pod FIXNÍM názvem - díky tomu Make může používat jednu neměnnou URL
      # (.../releases/latest/download/Sales_Reporting_latest.xlsx) navěky,
      # i po přelomu roku, kdy se změní jméno toho druhého souboru.
      - name: Duplicate output under a stable filename
        run: cp outputs/Sales_Reporting_*.xlsx outputs/Sales_Reporting_latest.xlsx

      - name: Compute release tag
        id: tag
        run: echo "value=report-$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Publish report as a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "Sales Report – ${{ steps.tag.outputs.value }}"
          make_latest: true
          files: |
            outputs/Sales_Reporting_2*.xlsx
            outputs/Sales_Reporting_latest.xlsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Weekly Sales Report

on:
  schedule:
    # Pondělí 6:00 CET/CEST => 5:00 UTC (v létě), 4:00 v zimě.
    # GitHub Actions cron je vždy v UTC - 5:00 UTC pokrývá obě varianty
    # rozumně (v zimě to bude v 6:00 místního času, v létě v 7:00).
    - cron: "0 5 * * 1"
  workflow_dispatch: {}   # umožňuje ruční spuštění tlačítkem v záložce Actions

permissions:
  contents: write   # potřeba, aby workflow mohl commitnout nová data zpět

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Nainstalovat závislosti
        run: pip install -r requirements.txt

      - name: Spustit generátor reportu
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python src/main.py

      - name: Commitnout aktualizovaná data a report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/
          git diff --quiet --cached || git commit -m "Weekly sales report update"
          git push

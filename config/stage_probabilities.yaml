# Sledované fáze pipeline - TENHLE seznam je pod tvojí kontrolou.
# main.py při každém běhu aktualizuje jen VÁHY (probability) živě z
# HubSpotu pro fáze, které už tu jsou - nepřidává nic automaticky
# (HubSpot má víc pipelines, a ne všechny fáze z nich chceme sledovat).
#
# Chceš přidat/odebrat fázi? Uprav stage_order i stages tady ručně.
stages:
  "Lead Engaged": 0.01
  "Meeting negotiation / contacted": 0.01
  "Intro meeting agreed": 0.01
  "Awaiting confirmation / Not Now": 0.03
  "Discover": 0.12
  "Validate": 0.20
  "Decide": 0.45
  "Commit": 0.90
  "Tech intro": 0.95
  "Implementation": 0.95
  "Testing": 0.95

stage_order:
  - "Lead Engaged"
  - "Meeting negotiation / contacted"
  - "Intro meeting agreed"
  - "Awaiting confirmation / Not Now"
  - "Discover"
  - "Validate"
  - "Decide"
  - "Commit"
  - "Tech intro"
  - "Implementation"
  - "Testing"
